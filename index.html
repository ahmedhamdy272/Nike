    <link rel="dns-prefetch" href="https://firebaseapp.com" />

    <!-- SEO Meta Tags -->

    <meta name="description" content="Discover the latest collection of premium Nike shoes, cataloging high-performance running, basketball, training, and lifestyle sneakers. Experience modern styling and ultimate comfort." />

    <meta name="author" content="Nike Store Catalog" />
    <meta name="robots" content="index, follow" />

    <meta name="twitter:image" content="/images/image_17.png" />
